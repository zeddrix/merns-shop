name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm format:check
      - run: pnpm quality:fast

  unit:
    runs-on: ubuntu-latest
    env:
      REQUIRE_NODE_22: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm test:unit

  integration:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/merns-shop
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm db:seed
      - run: pnpm test:integration

  verify:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/merns-shop
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm db:seed
      - run: pnpm verify

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm catalog:validate
      - run: pnpm build
      - run: pnpm perf:bundle-size

  lighthouse:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/merns-shop
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: production
      LH_BASE_URL: http://localhost:5040
      LH_SKIP: '0'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm db:seed
      - run: pnpm build
      - name: Start production server
        run: |
          PORT=5040 NODE_ENV=production node dist/backend/server.js &
          sleep 5
      - run: pnpm perf:lighthouse

  e2e:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/merns-shop
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: development
      PAYPAL_CLIENT_ID: ci-placeholder-paypal-client-id
      CI: true
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm db:seed
      - run: pnpm test:e2e

  e2e-pwa:
    runs-on: ubuntu-latest
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/merns-shop
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: production
      CI: true
      PUSH_ENABLED: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm icons:pwa
      - run: pnpm db:seed
      - run: pnpm test:e2e:pwa

  e2e-paypal:
    runs-on: ubuntu-latest
    if: vars.ENABLE_PAYPAL_E2E == 'true'
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
    env:
      MONGO_URI: mongodb://127.0.0.1:27017/merns-shop
      JWT_SECRET: ci-test-jwt-secret
      NODE_ENV: development
      CI: true
      PW_RUN_PAYPAL: '1'
      PAYPAL_CLIENT_ID: ${{ secrets.PAYPAL_CLIENT_ID }}
      PAYPAL_SANDBOX_BUYER_EMAIL: ${{ secrets.PAYPAL_SANDBOX_BUYER_EMAIL }}
      PAYPAL_SANDBOX_BUYER_PASSWORD: ${{ secrets.PAYPAL_SANDBOX_BUYER_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm db:seed
      - run: pnpm test:e2e:paypal
